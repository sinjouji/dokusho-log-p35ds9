:root{--accent:#1D9E75;--accent-dark:#0F6E56;--accent-bg:#E1F5EE;--accent-text:#085041}

.btn{background:none;border:1px solid #ccc;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;color:#3d2c24}

.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mnb{background:none;border:1px solid #ddd;border-radius:8px;padding:3px 12px;cursor:pointer;font-size:15px}

async function loadData(){
  try{
    const url = "https://raw.githubusercontent.com/sinjouji/my-b0o0oksd6t6/main/data.json?t=" + Date.now();

    const r = await fetch(url);
    if(!r.ok) throw new Error("HTTP " + r.status);

    const d = await r.json();

    books       = d.books       || [];
    tagMaster   = d.tagMaster   || [];
    series      = d.series      || [];
    characters  = d.characters  || [];
    features    = d.features    || defFeats();

    setSS('ok','✓ 同期済み');
  }catch(e){
    console.error(e);
    setSS('error','⚠ 読込失敗');
    alert("データの読み込みに失敗しました。\n" + e.message);
  }
}


async function manualSync(){
  setSS('saving','⟳ 再読み込み中...');
  await loadData();
  renderShelf();
}



function defFeats(){return[{id:'fav',name:'お気に入り度',desc:'4段階で評価を記録',on:true},{id:'tags',name:'タグ付け',desc:'本にタグを付けて分類',on:true},{id:'series',name:'シリーズ管理',desc:'続刊・シリーズをまとめる',on:true},{id:'characters',name:'登場人物',desc:'人物一覧と関連付けを管理',on:true},{id:'readlog',name:'読了ログ',desc:'読んだ日付・回数を記録',on:true},{id:'stats_tag',name:'タグ別統計',desc:'タグ別グラフを表示',on:true},{id:'stats_month',name:'月別読了数',desc:'月ごとの統計を表示',on:true},{id:'wishlist',name:'ウィッシュリスト',desc:'読みたい本を管理',on:true},{id:'memo',name:'メモ欄',desc:'各ページにメモ欄を表示',on:false}];}

// ---------- ユーティリティ ----------
const feat=id=>features.find(f=>f.id===id)?.on;
const tagById=id=>tagMaster.find(t=>t.id===id);
const bookById=id=>books.find(b=>b.id===id);
const charById=id=>characters.find(c=>c.id===id);
function tagFreq(){const c={};books.forEach(b=>b.tagIds.forEach(id=>{c[id]=(c[id]||0)+1;}));return c;}
function sortedTags(){const f=tagFreq();return[...tagMaster].sort((a,b)=>{const d=(f[b.id]||0)-(f[a.id]||0);return d||a.name.localeCompare(b.name,'ja');});}
const today=()=>new Date().toISOString().slice(0,10);
const favHtml=fav=>{if(!fav)return'';const o=FAV_OPTS.find(x=>x.v===fav);return o?`<span style="font-size:13px;color:${FAV_C[fav]}">${o.l}</span>`:''};
const chipsHtml=ids=>ids.map(id=>{const t=tagById(id);return t?`<span class="chip chip-on" style="background:${t.color};font-size:11px">${t.name}</span>`:''}).join('');
function latestDate(b){const v=(b.dates||[]).filter(d=>d);return v.length?v.slice().sort().reverse()[0]:'';}
const readCount=b=>(b.dates||[]).filter(d=>d).length;
function countYM(yr,mo){const p=`${yr}-${String(mo).padStart(2,'0')}`;let n=0;books.filter(b=>b.type==='normal').forEach(b=>{(b.dates||[]).forEach(d=>{if(d&&d.startsWith(p))n++;});});return n;}
function countY(yr){let n=0;books.filter(b=>b.type==='normal').forEach(b=>{(b.dates||[]).forEach(d=>{if(d&&d.startsWith(String(yr)))n++;});});return n;}
function booksOnDate(ds){return books.filter(b=>b.type==='normal'&&(b.dates||[]).includes(ds));}
function seriesLatestDate(s){let best='';s.bookIds.forEach(id=>{const b=bookById(id);if(!b)return;const ld=latestDate(b);if(ld>best)best=ld;});return best;}
function charSeriesNames(ch){return(ch.seriesIds||[]).map(sid=>{const s=series.find(x=>x.id===sid);return s?s.name:null;}).filter(Boolean);}
function spineColors(b){if(b.tagIds&&b.tagIds.length>=2){const t1=tagById(b.tagIds[0]),t2=tagById(b.tagIds[1]);if(t1&&t2)return[t1.color,t2.color];}if(b.tagIds&&b.tagIds.length===1){const t=tagById(b.tagIds[0]);if(t)return[t.color,t.color];}const c=DEF_COLORS[b.id%DEF_COLORS.length];return[c,c];}
function spineColor(b){return spineColors(b)[0];}
function spineW(b){const l=b.title.length;return l<=4?32:l<=8?42:l<=14?52:62;}
function spineH(b){const base=155+(b.title.length>10?14:0);const favH=b.fav?28:0;return base+favH;}
function relevanceScore(bt,sn){if(!sn)return 0;let s=0;if(bt.includes(sn))s+=20;for(const c of sn)if(bt.includes(c))s++;return s;}

function tagChipSorted(){const freq=tagFreq();const tags=[...tagMaster];if(tagChipOrder==='freq-desc')return tags.sort((a,b)=>(freq[b.id]||0)-(freq[a.id]||0)||a.name.localeCompare(b.name,'ja'));if(tagChipOrder==='freq-asc')return tags.sort((a,b)=>(freq[a.id]||0)-(freq[b.id]||0)||a.name.localeCompare(b.name,'ja'));if(tagChipOrder==='name-asc')return tags.sort((a,b)=>a.name.localeCompare(b.name,'ja'));if(tagChipOrder==='name-desc')return tags.sort((a,b)=>b.name.localeCompare(a.name,'ja'));return tags;}
function cycleTagChipOrder(){const orders=['freq-desc','freq-asc','name-asc','name-desc'];const i=orders.indexOf(tagChipOrder);tagChipOrder=orders[(i+1)%orders.length];localStorage.setItem('tagChipOrder',tagChipOrder);renderSettings();}
function tagChipOrderLabel(){if(tagChipOrder==='freq-desc')return'冊数↓';if(tagChipOrder==='freq-asc')return'冊数↑';if(tagChipOrder==='name-asc')return'名前↑';if(tagChipOrder==='name-desc')return'名前↓';return'冊数↓';}
function cycleTagFilter(id){const cur=tagFilterModes[id];if(!cur)tagFilterModes[id]='and';else if(cur==='and')tagFilterModes[id]='or';else if(cur==='or')tagFilterModes[id]='not';else delete tagFilterModes[id];saveFilterState();renderFilterChips();renderShelfList();}
function bookPassesTagFilter(b){const active=Object.keys(tagFilterModes).filter(id=>tagFilterModes[id]);if(!active.length)return true;const and=active.filter(id=>tagFilterModes[id]==='and');const or=active.filter(id=>tagFilterModes[id]==='or');const not=active.filter(id=>tagFilterModes[id]==='not');if(and.length&&!and.every(id=>b.tagIds.includes(id)))return false;if(or.length&&!or.some(id=>b.tagIds.includes(id)))return false;if(not.some(id=>b.tagIds.includes(id)))return false;return true;}

function renderNav(){
  const pages=[{id:'shelf',label:'本棚'},{id:'series',label:'シリーズ',hide:!feat('series')},{id:'characters',label:'登場人物',hide:!feat('characters')},{id:'stats',label:'統計'},{id:'settings',label:'設定'}];
  document.getElementById('nav-area').innerHTML=pages.filter(p=>!p.hide).map(p=>`<button class="nb" id="nb-${p.id}" onclick="goPage('${p.id}')">${p.label}</button>`).join('')+`<span style="display:inline-flex;gap:3px;margin-left:6px"><button class="view-btn ${vM==='list'?'act':''}" onclick="setView('list')">☰</button><button class="view-btn ${vM==='spine'?'act':''}" onclick="setView('spine')">📚</button></span>`;
}
function goPage(id,skip){

  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.getElementById('pg-'+id).classList.add('on');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));const nb=document.getElementById('nb-'+id);if(nb)nb.classList.add('act');

function setView(m){vM=m;localStorage.setItem('vM',m);renderNav();renderShelf();}

function renderShelf(){

  <div class="row" style="margin-bottom:8px;gap:6px"><input class="sinp" style="flex:1;min-width:0" type="text" placeholder="タイトルで検索..." oninput="renderShelfList()" id="shelf-q"><div class="row" style="gap:3px;flex-shrink:0" id="sort-btns"></div></div>

function renderSortBtns(){const el=document.getElementById('sort-btns');if(!el)return;el.innerHTML=[{k:'title',l:'タイトル'},{k:'date',l:'読了日'},{k:'fav',l:'評価'}].map(s=>{const act=sK===s.k,arr=act?(sD==='asc'?'↑':'↓'):'';return`<button class="sort-btn ${act?'act':''}" onclick="setSort('${s.k}')">${s.l}${arr}</button>`;}).join('');}
function setSort(k){sK===k?(sD=sD==='asc'?'desc':'asc'):(sK=k,sD=k==='title'?'asc':'desc');saveFilterState();renderSortBtns();renderShelfList();}
function renderFilterChips(){const wO=feat('wishlist'),fO=feat('fav'),tO=feat('tags');let r1='';if(wO)[{v:'',l:'全種類'},{v:'normal',l:'読了'},{v:'wish',l:'ウィッシュリスト'}].forEach(o=>{const on=aTy===o.v;r1+=`<span class="cf${on?' mode-and':''}" style="${on?'background:#888780;border-color:#888780':''}" onclick="setTy('${o.v}')">${o.l}</span>`;});if(fO)[{v:0,l:'★全て'},{v:4,l:'👑'},{v:3,l:'★★★'},{v:2,l:'★★以上'},{v:1,l:'★以上'}].forEach(o=>{const on=aFv===o.v;r1+=`<span class="cf${on?' mode-and':''}" style="${on?'background:#EF9F27;border-color:#EF9F27':''}" onclick="setFv(${o.v})">${o.l}</span>`;});let r2='';if(tO){r2+='<span style="font-size:11px;color:#bbb;align-self:center">タップ:AND→OR→NOT</span>';tagChipSorted().forEach(t=>{const mode=tagFilterModes[t.id];let cls='cf',style='',lbl=t.name;if(mode==='and'){cls='cf mode-and';style=`background:${t.color};border-color:${t.color}`;}else if(mode==='or'){cls='cf mode-or';style=`background:${t.color};border-color:${t.color}`;lbl+=' OR';}else if(mode==='not'){cls='cf mode-not';style='background:#A32D2D;border-color:#A32D2D';}r2+=`<span class="${cls}" style="${style}" onclick="cycleTagFilter('${t.id}')">${lbl}</span>`;});}const e1=document.getElementById('fr1'),e2=document.getElementById('fr2');if(e1)e1.innerHTML=r1;if(e2)e2.innerHTML=r2;}
function setTy(v){aTy=aTy===v&&v!==''?'':v;saveFilterState();renderFilterChips();renderShelfList();}
function setFv(v){aFv=aFv===v&&v!==0?0:v;saveFilterState();renderFilterChips();renderShelfList();}
function filteredBooks(){const q=(document.getElementById('shelf-q')?.value||'').toLowerCase(),wO=feat('wishlist');return books.filter(b=>{if(!wO&&b.type==='wish')return false;if(q&&!b.title.toLowerCase().includes(q))return false;if(aTy&&b.type!==aTy)return false;if(aFv&&(b.fav||0)<aFv)return false;if(!bookPassesTagFilter(b))return false;return true;}).slice().sort((a,b)=>{let c=0;if(sK==='title')c=a.title.localeCompare(b.title,'ja',{numeric:true,sensitivity:'base'});else if(sK==='date'){const da=latestDate(a),db=latestDate(b);c=da<db?-1:da>db?1:0;if(c===0)c=a.id-b.id;}else if(sK==='fav')c=(a.fav||0)-(b.fav||0);return sD==='asc'?c:-c;});}
function renderShelfList(){const el=document.getElementById('shelf-list');if(!el)return;const list=filteredBooks();if(!list.length){el.innerHTML='<div style="font-size:13px;color:#888;padding:12px">該当する本がありません</div>';return;}if(vM==='spine'){renderSpineShelves(list,el);}else{const rO=feat('readlog');el.innerHTML=list.map(b=>{const ld=latestDate(b),cnt=readCount(b);return`<div class="bitem ${b.type}" onclick="openDetail(${b.id})"><div class="row between"><div class="bt">${b.title}${b.type==='wish'?' <span class="wbadge">ウィッシュリスト</span>':''}</div>${rO&&cnt>0?`<span class="cnt">${cnt}回読了</span>`:''}</div><div class="brow">${ld?`<span class="bdate">${ld}</span>`:''}${feat('tags')?chipsHtml(b.tagIds):''}${feat('fav')?favHtml(b.fav):''}</div></div>`;}).join('');}}
function renderSpineShelves(list,container){const cw=container.clientWidth||window.innerWidth-32||600;const GAP=6;const rows=[];let row=[],rw=0;for(const b of list){const w=spineW(b);const need=rw===0?w:rw+GAP+w;if(rw>0&&need>cw){rows.push(row);row=[b];rw=w;}else{row.push(b);rw=need;}}if(row.length)rows.push(row);let html='<div class="spine-section">';for(const r of rows){html+='<div class="spine-row">';for(const b of r){const[c1,c2]=spineColors(b);const bgStyle=spineGradMode==='grad'&&c1!==c2?`background:linear-gradient(to bottom,${c1} 75%,${c2})`:spineGradMode==='split'&&c1!==c2?`background:linear-gradient(to bottom,${c1} 70%,${c2} 70%)`:`background:${c1}`;const w=spineW(b),h=spineH(b),fav=b.fav?FAV_OPTS.find(o=>o.v===b.fav)?.l:'';const dimStyle=b.type==='wish'?'filter:brightness(0.72)':'';html+=`<div class="spine-book" style="${bgStyle};width:${w}px;height:${h}px;${dimStyle}" onclick="openDetail(${b.id})" title="${b.title}">${b.type==='wish'?'<div class="spine-wish"></div>':''}<div class="spine-title">${b.title}</div>${fav?`<div class="spine-fav">${fav}</div>`:''}</div>`;}html+='</div><div class="shelf-board"></div>';}html+='</div>';container.innerHTML=html;}

function openDetail(id){curDet=id;renderDetail();goPage('detail',true);}
function renderDetail(){

  const bS=series.filter(s=>s.bookIds.includes(b.id));const notInSeries=series.filter(s=>!s.bookIds.includes(b.id)).sort((a,z)=>relevanceScore(b.title,z.name)-relevanceScore(b.title,a.name));
  const mS=b.memo&&b.memo.trim()!=='',cnt=readCount(b),rO=feat('readlog');
  pg.innerHTML=`<div class="row" style="margin-bottom:14px"><button class="btn btn-sm" onclick="goPage(prevPg)">← 戻る</button></div>
  <div class="card">
    <div class="row between" style="margin-bottom:12px"><div style="font-size:16px;font-weight:600" id="d-tt">${b.title}</div><div class="row" style="gap:6px"><button class="btn btn-sm" onclick="dupBook(${b.id})">複製</button><button class="btn btn-sm" onclick="togDE()">編集</button></div></div>
    <div id="d-ea" style="display:none;margin-bottom:12px"><div class="fr"><div class="fl">タイトル</div><input class="edit-inp" id="d-ti" value="${b.title}"></div><div class="row" style="justify-content:flex-end"><button class="btn-pri btn-sm" onclick="saveDT()">保存</button></div></div>
    ${feat('wishlist')?`<div class="df"><div class="dl">種別</div><div class="row" style="gap:6px"><span class="chip ${b.type==='normal'?'chip-on':'chip-off'}" style="${b.type==='normal'?'background:var(--accent)':''}" onclick="setDTy('normal')">読了</span><span class="chip ${b.type==='wish'?'chip-on':'chip-off'}" style="${b.type==='wish'?'background:#888780':''}" onclick="setDTy('wish')">ウィッシュリスト</span></div></div>`:''}
    ${rO?`<div class="df"><div class="row between" style="margin-bottom:6px"><div class="row" style="gap:8px"><div class="dl" style="margin:0">読了ログ</div>${cnt>0?`<span style="font-size:12px;color:#888">${cnt}回読了</span>`:''}</div><button class="btn btn-sm" onclick="addRR()">再読了</button></div><div id="d-dl"></div></div>`:''}
    ${feat('fav')?`<div class="df"><div class="dl">お気に入り度</div><div id="d-fc" class="row wrap" style="gap:6px;margin-top:3px"></div></div>`:''}
    ${feat('tags')?`<div class="df"><div class="dl">タグ</div><div id="d-tc" class="row wrap" style="gap:5px;margin-top:3px"></div></div>`:''}
    ${feat('memo')?`<div class="df"><div class="row between" style="margin-bottom:4px"><div class="dl">メモ</div><button class="btn btn-sm" onclick="togBME()">編集</button></div><div id="d-md" style="display:${mS?'block':'none'}"><div class="memo-disp">${(b.memo||'').replace(/</g,'&lt;')}</div></div><div id="d-me" style="display:${mS?'none':'block'}"><textarea class="memo-area" id="d-memo">${b.memo||''}</textarea><button class="btn-pri btn-sm" onclick="saveDM()" style="margin-top:5px">保存</button></div></div>`:''}
    ${feat('series')?`<div class="df"><div class="dl">シリーズ</div><div class="row wrap" style="gap:5px;margin-bottom:8px">${bS.length?bS.map(s=>`<span class="chip chip-on" style="background:var(--accent);cursor:pointer" onclick="openSerDet('${s.id}')">${s.name} →</span>`).join(''):'<span style="font-size:12px;color:#aaa">未登録</span>'}</div>${notInSeries.length?`<div class="row" style="gap:6px"><select class="sinp" id="d-ser-sel" style="flex:1"><option value="">シリーズに追加...</option>${notInSeries.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select><button class="btn btn-sm" onclick="addDetToSeries()">追加</button></div>`:''}<div style="margin-top:8px"><button class="btn btn-sm" onclick="createSeriesFromBook(${b.id})" style="font-size:12px">＋「${b.title}」でシリーズを新規作成</button></div></div>`:''}

function dupBook(id){const b=bookById(id);if(!b)return;const nb={...b,id:Date.now(),title:b.title+'c',dates:[...(b.dates||[])],tagIds:[...b.tagIds]};books.unshift(nb);series.forEach(s=>{if(s.bookIds.includes(id))s.bookIds.push(nb.id);});curDet=nb.id;renderDetail();scheduleSave();}
function addDetToSeries(){const sid=document.getElementById('d-ser-sel')?.value;if(!sid)return;const s=series.find(x=>x.id===sid);if(!s||s.bookIds.includes(curDet))return;s.bookIds.push(curDet);renderDetail();scheduleSave();}
function togDE(){const el=document.getElementById('d-ea');el.style.display=el.style.display==='none'?'':'none';}
function saveDT(){const b=bookById(curDet);if(!b)return;const v=document.getElementById('d-ti').value.trim();if(v)b.title=v;document.getElementById('d-tt').textContent=b.title;togDE();scheduleSave();}
function togBME(){const d=document.getElementById('d-md'),e=document.getElementById('d-me');const isE=e.style.display!=='none';d.style.display=isE?'block':'none';e.style.display=isE?'none':'block';}
function saveDM(){const b=bookById(curDet);if(!b)return;const val=document.getElementById('d-memo').value;b.memo=val;const d=document.getElementById('d-md'),e=document.getElementById('d-me');d.querySelector('.memo-disp').textContent=val;val.trim()?(d.style.display='block',e.style.display='none'):(d.style.display='none',e.style.display='block');scheduleSave();}
function setDTy(t){const b=bookById(curDet);if(!b)return;b.type=t;renderDetail();scheduleSave();}
function renderDDates(){const el=document.getElementById('d-dl');if(!el)return;const b=bookById(curDet);if(!b)return;el.innerHTML=!(b.dates&&b.dates.length)?'<div style="font-size:13px;color:#888">未設定</div>':b.dates.map((d,i)=>`<div class="row" style="gap:6px;margin-bottom:5px"><input class="edit-inp" type="date" value="${d}" style="flex:1" onchange="updD(${i},this.value)"><button class="btn btn-sm" onclick="clrD(${i})">クリア</button>${i>0?`<button class="btn btn-sm btn-danger" onclick="remD(${i})">削除</button>`:''} ${d?`<button class="btn btn-sm" style="padding:4px 7px;font-size:11px" onclick="openCalFromDate('${d}')" title="カレンダー">📅</button>`:''}</div>`).join('');}
function openCalFromDate(ds){const p=ds.split('-');calYr=parseInt(p[0]);calMo=parseInt(p[1]);calFromDate=ds;goPage('stats');}
function addRR(){const b=bookById(curDet);if(!b)return;if(!b.dates)b.dates=[];b.dates.push(today());renderDetail();scheduleSave();}
function updD(i,v){const b=bookById(curDet);if(b){b.dates[i]=v;scheduleSave();}}
function clrD(i){const b=bookById(curDet);if(!b)return;b.dates[i]='';renderDDates();scheduleSave();}
function remD(i){const b=bookById(curDet);if(!b)return;b.dates.splice(i,1);renderDetail();scheduleSave();}
function renderDFav(){const el=document.getElementById('d-fc');if(!el)return;const b=bookById(curDet);if(!b)return;el.innerHTML=FAV_OPTS.map(o=>{const on=b.fav===o.v;return`<span class="chip ${on?'chip-on':'chip-off'}" style="${on?'background:'+FAV_C[o.v]:''}" onclick="setDF(${o.v})">${o.l}</span>`;}).join('');}
function setDF(v){const b=bookById(curDet);if(!b)return;b.fav=b.fav===v?0:v;renderDFav();scheduleSave();}
function renderDTags(){const el=document.getElementById('d-tc');if(!el)return;const b=bookById(curDet);if(!b)return;el.innerHTML=sortedTags().map(t=>{const on=b.tagIds.includes(t.id);return`<span class="chip ${on?'chip-on':'chip-off'}" style="${on?'background:'+t.color:''}" onclick="togDT('${t.id}')">${t.name}</span>`;}).join('');}
function togDT(id){const b=bookById(curDet);if(!b)return;b.tagIds=b.tagIds.includes(id)?b.tagIds.filter(x=>x!==id):[...b.tagIds,id];renderDTags();scheduleSave();}
function delBook(id){if(!confirm('この本を削除しますか？'))return;books=books.filter(b=>b.id!==id);series.forEach(s=>{s.bookIds=s.bookIds.filter(x=>x!==id);});goPage(prevPg);scheduleSave();}

function renderSeriesPage(){const pg=document.getElementById('pg-series');const filteredSeries=series.filter(s=>!serSearch||s.name.toLowerCase().includes(serSearch.toLowerCase()));const sortedSeries=[...filteredSeries].sort((a,b)=>{let c=0;if(serSort==='name')c=a.name.localeCompare(b.name,'ja');else if(serSort==='date'){const da=seriesLatestDate(a),db=seriesLatestDate(b);c=da<db?-1:da>db?1:0;}return serSortDir==='asc'?c:-c;});pg.innerHTML=`<div class="row between" style="margin-bottom:10px"><div style="font-size:15px;font-weight:600">シリーズ</div><button class="btn" onclick="openSerAdd()">+ シリーズ追加</button></div><div class="row" style="gap:6px;margin-bottom:8px"><input class="sinp" style="flex:1;min-width:0" type="text" placeholder="シリーズを検索..." value="${serSearch}" oninput="serSearch=this.value;renderSeriesPage()"><div class="row" style="gap:3px;flex-shrink:0">${[{k:'name',l:'名前'},{k:'date',l:'読了日'}].map(s=>{const act=serSort===s.k,arr=act?(serSortDir==='asc'?'↑':'↓'):'';return`<button class="sort-btn ${act?'act':''}" onclick="setSerSort('${s.k}')">${s.l}${arr}</button>`;}).join('')}</div></div>${sortedSeries.map(s=>`<div class="card" onclick="openSerDet('${s.id}')" style="cursor:pointer"><div class="row between"><div style="font-weight:500">${s.name}</div><div style="font-size:12px;color:#888">${s.bookIds.length}冊</div></div><div class="row wrap" style="gap:5px;margin-top:8px">${s.bookIds.map((id,i)=>{const b=bookById(id);return b?`<span class="vb ${b.type==='wish'?'unread':''}" title="${b.title}">${i+1}</span>`:''}).join('')}</div></div>`).join('')||'<div style="font-size:13px;color:#888">シリーズがありません</div>'}`;}
function setSerSort(k){serSort===k?(serSortDir=serSortDir==='asc'?'desc':'asc'):(serSort=k,serSortDir='asc');localStorage.setItem('serSort',serSort);localStorage.setItem('serSortDir',serSortDir);renderSeriesPage();}
function openSerAdd(){saBooks=[];document.getElementById('sa-name').value='';document.getElementById('sa-memo').value='';document.getElementById('sa-search').value='';document.getElementById('sa-memo-wrap').style.display=feat('memo')?'':'none';renderSABS();renderSABL();document.getElementById('series-add-modal').classList.add('open');}

function togSME(){const d=document.getElementById('sd-md'),e=document.getElementById('sd-me');const isE=e.style.display!=='none';d.style.display=isE?'block':'none';e.style.display=isE?'none':'block';}
function saveSM(){const s=series.find(x=>x.id===curSer);if(!s)return;const val=document.getElementById('sd-memo').value;s.memo=val;const d=document.getElementById('sd-md'),e=document.getElementById('sd-me');d.querySelector('.memo-disp').textContent=val;val.trim()?(d.style.display='block',e.style.display='none'):(d.style.display='none',e.style.display='block');scheduleSave();}
function renderSDBL(){const s=series.find(x=>x.id===curSer);if(!s)return;const el=document.getElementById('sd-bl');if(el)el.innerHTML=s.bookIds.map((id,i)=>{const b=bookById(id);if(!b)return'';return`<div class="row between" style="padding:5px 0;border-bottom:1px solid #eee"><div class="row" style="gap:6px"><span class="vb" style="background:var(--accent);color:#fff">${i+1}</span><span class="chip chip-on" style="background:${b.type==='normal'?'var(--accent)':'#888780'};cursor:pointer;font-size:12px" onclick="openDetFS(${b.id})">${b.title}</span></div><button class="btn btn-sm btn-danger" onclick="remFS(${id})">外す</button></div>`;}).join('')||'<div style="font-size:13px;color:#888">まだ本が登録されていません</div>';const sel=document.getElementById('sd-bs');if(!sel)return;const q=(document.getElementById('sd-search')?.value||'').toLowerCase();const sName=(series.find(x=>x.id===curSer)||{}).name||'';const candidates=books.filter(b=>!s.bookIds.includes(b.id)).filter(b=>!q||b.title.toLowerCase().includes(q)).sort((a,b)=>relevanceScore(b.title,sName)-relevanceScore(a.title,sName));sel.innerHTML='<option value="">本を選択...</option>'+candidates.map(b=>`<option value="${b.id}">${b.title}</option>`).join('');}
function openDetFS(id){curDet=id;renderDetail();document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.getElementById('pg-detail').classList.add('on');prevPg='series-detail';}
function togSE(){const el=document.getElementById('sd-ea');el.style.display=el.style.display==='none'?'':'none';}
function saveSN(){const s=series.find(x=>x.id===curSer);if(!s)return;const v=document.getElementById('sd-ni').value.trim();if(v)s.name=v;document.getElementById('sd-nd').textContent=s.name;togSE();scheduleSave();}
function addBtoS(){const s=series.find(x=>x.id===curSer);if(!s)return;const id=parseInt(document.getElementById('sd-bs').value);if(!id)return;s.bookIds.push(id);renderSerDet();scheduleSave();}
function remFS(id){const s=series.find(x=>x.id===curSer);if(!s)return;s.bookIds=s.bookIds.filter(x=>x!==id);renderSerDet();scheduleSave();}
function delSeries(id){if(!confirm('このシリーズを削除しますか？'))return;series=series.filter(s=>s.id!==id);goPage('series');scheduleSave();}
function createSeriesFromBook(bookId){const b=bookById(bookId);if(!b)return;const name=b.title;if(series.find(s=>s.name===name)){alert(`「${name}」というシリーズはすでに存在します。`);return;}const ns={id:'s'+Date.now(),name,bookIds:[bookId],memo:''};series.push(ns);curSer=ns.id;renderDetail();scheduleSave();if(confirm(`シリーズ「${name}」を作成しました。シリーズページを開きますか？`)){openSerDet(ns.id);}}
function createBookFromSeries(seriesId){const s=series.find(x=>x.id===seriesId);if(!s)return;const title=s.name;const newBook={id:Date.now(),title,dates:[],tagIds:[],fav:0,type:'normal',memo:''};books.unshift(newBook);s.bookIds.push(newBook.id);scheduleSave();renderSerDet();if(confirm(`本「${title}」を作成してシリーズに追加しました。本の個別ページを開きますか？`)){curDet=newBook.id;renderDetail();document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.getElementById('pg-detail').classList.add('on');prevPg='series-detail';}}

function renderCharPage(){const pg=document.getElementById('pg-characters');const filtered=characters.filter(c=>!charSearch||c.name.toLowerCase().includes(charSearch.toLowerCase()));const sorted=[...filtered].sort((a,b)=>{let c=0;if(charSort==='name')c=a.name.localeCompare(b.name,'ja');else if(charSort==='series'){const sa=charSeriesNames(a).join(','),sb=charSeriesNames(b).join(',');c=sa.localeCompare(sb,'ja');}return charSortDir==='asc'?c:-c;});pg.innerHTML=`<div class="row between" style="margin-bottom:10px"><div style="font-size:15px;font-weight:600">登場人物</div><button class="btn" onclick="openCharAddModal()">+ 追加</button></div><div class="row" style="gap:6px;margin-bottom:8px"><input class="sinp" style="flex:1;min-width:0" type="text" placeholder="人物名で検索..." value="${charSearch}" oninput="charSearch=this.value;renderCharPage()"><div class="row" style="gap:3px;flex-shrink:0">${[{k:'name',l:'名前'},{k:'series',l:'関連作品'}].map(s=>{const act=charSort===s.k,arr=act?(charSortDir==='asc'?'↑':'↓'):'';return`<button class="sort-btn ${act?'act':''}" onclick="setCharSort('${s.k}')">${s.l}${arr}</button>`;}).join('')}</div></div>${sorted.map(c=>{const sNames=charSeriesNames(c);return`<div class="card" onclick="openCharDet('${c.id}')" style="cursor:pointer"><div style="font-weight:600;font-size:14px;margin-bottom:4px">${c.name}${c.alias?` <span style="font-size:12px;color:#888;font-weight:400">（${c.alias}）</span>`:''}</div>${sNames.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">${sNames.map(n=>`<span class="chip chip-on" style="background:#7A5C35;font-size:11px">${n}</span>`).join('')}</div>`:'<div style="font-size:12px;color:#aaa">シリーズ未登録</div>'}</div>`;}).join('')||'<div style="font-size:13px;color:#888">登場人物がいません</div>'}`;
}
function setCharSort(k){charSort===k?(charSortDir=charSortDir==='asc'?'desc':'asc'):(charSort=k,charSortDir='asc');localStorage.setItem('charSort',charSort);localStorage.setItem('charSortDir',charSortDir);renderCharPage();}
function openCharAddModal(){caSelSeries=[];document.getElementById('ca-name').value='';document.getElementById('ca-alias').value='';document.getElementById('ca-memo').value='';renderCASerChips();document.getElementById('char-add-modal').classList.add('open');}
function renderCASerChips(){document.getElementById('ca-ser-chips').innerHTML=series.map(s=>{const on=caSelSeries.includes(s.id);return`<span class="chip ${on?'chip-on':'chip-off'}" style="${on?'background:#7A5C35':''}" onclick="togCASer('${s.id}')">${s.name}</span>`;}).join('');}
function togCASer(id){caSelSeries=caSelSeries.includes(id)?caSelSeries.filter(x=>x!==id):[...caSelSeries,id];renderCASerChips();}
function saveNewChar(){const name=document.getElementById('ca-name').value.trim();if(!name)return;const alias=document.getElementById('ca-alias').value.trim();const memo=document.getElementById('ca-memo').value;characters.push({id:'ch'+Date.now(),name,alias,seriesIds:[...caSelSeries],memo});document.getElementById('char-add-modal').classList.remove('open');renderCharPage();scheduleSave();}
function openCharDet(id){curChar=id;renderCharDet();goPage('char-detail',true);}
function renderCharDet(){const c=charById(curChar);if(!c)return;const pg=document.getElementById('pg-char-detail');const mS=c.memo&&c.memo.trim()!=='';const sNames=charSeriesNames(c);const notLinked=series.filter(s=>!(c.seriesIds||[]).includes(s.id)).sort((a,b)=>relevanceScore(b.name,c.name)-relevanceScore(a.name,c.name));pg.innerHTML=`<div class="row" style="margin-bottom:14px"><button class="btn btn-sm" onclick="goPage(prevPg)">← 戻る</button></div><div class="card"><div class="row between" style="margin-bottom:12px"><div style="font-size:16px;font-weight:600" id="cd-name">${c.name}</div><button class="btn btn-sm" onclick="togCDE()">編集</button></div><div id="cd-ea" style="display:none;margin-bottom:12px"><div class="fr"><div class="fl">名前</div><input class="edit-inp" id="cd-ni" value="${c.name}"></div><div class="fr"><div class="fl">あだ名・別名</div><input class="edit-inp" id="cd-ai" value="${c.alias||''}"></div><div class="row" style="justify-content:flex-end"><button class="btn-pri btn-sm" onclick="saveCDEdit()">保存</button></div></div>${c.alias?`<div class="df"><div class="dl">あだ名・別名</div><div style="font-size:13px">${c.alias}</div></div>`:''}<div class="df"><div class="dl">シリーズ</div><div class="row wrap" style="gap:5px;margin-bottom:8px">${sNames.length?sNames.map((n,i)=>{const sid=(c.seriesIds||[])[i];return`<span class="chip chip-on" style="background:#7A5C35;cursor:pointer" onclick="openSerDet('${sid}')">${n} →</span>`;}).join(''):'<span style="font-size:12px;color:#aaa">未登録</span>'}</div>${notLinked.length?`<div class="row" style="gap:6px"><select class="sinp" id="cd-ser-sel" style="flex:1"><option value="">シリーズに関連付け...</option>${notLinked.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select><button class="btn btn-sm" onclick="addCharToSeries()">追加</button></div>`:''}</div><div class="df"><div class="row between" style="margin-bottom:4px"><div class="dl">メモ</div><button class="btn btn-sm" onclick="togCDME()">編集</button></div><div id="cd-md" style="display:${mS?'block':'none'}"><div class="memo-disp">${(c.memo||'').replace(/</g,'&lt;')}</div></div><div id="cd-me" style="display:${mS?'none':'block'}"><textarea class="memo-area" id="cd-memo">${c.memo||''}</textarea><button class="btn-pri btn-sm" onclick="saveCDMemo()" style="margin-top:5px">保存</button></div></div><div class="divider"></div><button class="btn btn-sm btn-danger" onclick="delChar('${c.id}')">この人物を削除</button></div>`;}

function saveCDEdit(){const c=charById(curChar);if(!c)return;const n=document.getElementById('cd-ni').value.trim();if(n)c.name=n;c.alias=document.getElementById('cd-ai').value.trim();document.getElementById('cd-name').textContent=c.name;togCDE();scheduleSave();}

// --- 統計 ---
function renderStats(){const pg=document.getElementById('pg-stats');const freq=tagFreq(),st=sortedTags().filter(t=>freq[t.id]),max=st[0]?freq[st[0].id]:1;const th=feat('stats_tag')?`<div class="card"><div style="font-weight:500;margin-bottom:10px">タグ別読了数</div>${st.map(t=>`<div class="cbar-row"><span class="clbl">${t.name}</span><div class="cbg"><div class="cfill" style="width:${Math.round((freq[t.id]||0)/max*100)}%;background:${t.color}"></div></div><span class="cval">${freq[t.id]||0}</span></div>`).join('')||'<div style="font-size:13px;color:#888">データなし</div>'}</div>`:'';const mh=feat('stats_month')?`<div class="card"><div class="month-nav"><button class="mnb" onclick="statsYr--;renderMC()">‹</button><div style="font-weight:500;font-size:14px;min-width:60px;text-align:center" id="sy-lbl">${statsYr}年</div><button class="mnb" onclick="statsYr++;renderMC()">›</button></div><div id="mc-body"></div></div>`:'';const calH=`<div class="card"><div class="month-nav"><button class="mnb" onclick="calPrev()">‹</button><div style="font-weight:500;font-size:14px;min-width:80px;text-align:center" id="cal-lbl">${calYr}年${calMo}月</div><button class="mnb" onclick="calNext()">›</button></div><div id="cal-grid"></div></div>`;pg.innerHTML=calH+th+mh||'<div style="font-size:13px;color:#888">統計機能がオフです</div>';if(feat('stats_month'))renderMC();renderCalendar();}
function renderMC(){const lbl=document.getElementById('sy-lbl');if(lbl)lbl.textContent=statsYr+'年';const el=document.getElementById('mc-body');if(!el)return;const counts=MONTHS.map((_,i)=>countYM(statsYr,i+1)),max=Math.max(...counts,1);const accent=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#1D9E75';el.innerHTML=counts.map((n,i)=>`<div class="cbar-row"><span class="clbl">${MONTHS[i]}</span><div class="cbg"><div class="cfill" style="width:${Math.round(n/max*100)}%;background:${accent}"></div></div><span class="cval">${n}</span></div>`).join('');}
function calPrev(){calMo--;if(calMo<1){calMo=12;calYr--;}renderCalendar();}
function calNext(){calMo++;if(calMo>12){calMo=1;calYr++;}renderCalendar();}
function renderCalendar(){const lbl=document.getElementById('cal-lbl');if(lbl)lbl.textContent=calYr+'年'+calMo+'月';const el=document.getElementById('cal-grid');if(!el)return;const todayStr=today();const firstDay=new Date(calYr,calMo-1,1).getDay();const lastDate=new Date(calYr,calMo,0).getDate();let html='<div class="cal-grid">';WDAYS.forEach(w=>{html+=`<div class="cal-head">${w}</div>`;});for(let i=0;i<firstDay;i++)html+=`<div class="cal-cell other-month"></div>`;for(let d=1;d<=lastDate;d++){const ds=`${calYr}-${String(calMo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const cnt=booksOnDate(ds).length;const isToday=ds===todayStr;html+=`<div class="cal-cell ${isToday?'today':''}"><div class="cal-day-num">${d}</div>${cnt>0?`<span class="cal-count" onclick="openDayModal('${ds}')">${cnt}</span>`:''}</div>`;}html+='</div>';el.innerHTML=html;}
function openDayModal(ds){const list=booksOnDate(ds).slice().sort((a,b)=>a.id-b.id);document.getElementById('day-modal-title').textContent=`${ds} の読了`;document.getElementById('day-modal-list').innerHTML=list.map(b=>`<div class="bitem normal" style="cursor:pointer" onclick="openDetailFromDay(${b.id})"><div class="bt">${b.title}</div><div class="brow">${feat('tags')?chipsHtml(b.tagIds):''}${feat('fav')?favHtml(b.fav):''}</div></div>`).join('')||'<div style="font-size:13px;color:#888">なし</div>';document.getElementById('day-modal').classList.add('open');}
function openDetailFromDay(id){document.getElementById('day-modal').classList.remove('open');curDet=id;prevPg='stats';renderDetail();document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.getElementById('pg-detail').classList.add('on');document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));}

  <div style="font-size:15px;font-weight:600;margin-bottom:10px">表示設定</div>
  <div class="card" style="margin-bottom:10px"><div style="font-size:13px;font-weight:500;margin-bottom:10px">アクセントカラー</div><div style="display:flex;gap:10px;flex-wrap:wrap">${ACCENT_THEMES.map((t,i)=>`<div onclick="applyAccent(${i});renderSettings()" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:32px;height:32px;border-radius:50%;background:${t.accent};border:3px solid ${accentIdx===i?'#333':'transparent'};transition:.15s"></div><div style="font-size:10px;color:#888;white-space:nowrap">${t.name}</div></div>`).join('')}</div></div>
  <div class="card" style="margin-bottom:10px"><div class="row between"><div><div style="font-size:13px;font-weight:500;margin-bottom:2px">背表紙カラーモード</div><div style="font-size:11px;color:#888">${spineGradMode==='grad'?'グラデーション':spineGradMode==='split'?'くっきり':'単色'}</div></div><div style="display:flex;gap:6px"><button class="sort-btn ${spineGradMode==='single'?'act':''}" onclick="setSpineGradMode('single')">単色</button><button class="sort-btn ${spineGradMode==='grad'?'act':''}" onclick="setSpineGradMode('grad')">グラデーション</button><button class="sort-btn ${spineGradMode==='split'?'act':''}" onclick="setSpineGradMode('split')">くっきり</button></div></div></div>
  <div class="card" style="margin-bottom:20px"><div class="row between"><div><div style="font-size:13px;font-weight:500;margin-bottom:2px">絞り込みタグの並び順</div><div style="font-size:11px;color:#888">タップで切り替え</div></div><button class="sort-btn act" onclick="cycleTagChipOrder()">${tagChipOrderLabel()}</button></div></div>
  <div style="font-size:15px;font-weight:600;margin-bottom:10px">タグ管理</div>
  <div class="card" id="tag-card"></div>`;
  renderTagCard();
}
function saveCfgAndReload(){localStorage.setItem('gh_owner',document.getElementById('cfg-owner').value.trim());localStorage.setItem('gh_repo',document.getElementById('cfg-repo').value.trim());localStorage.setItem('gh_path',document.getElementById('cfg-path').value.trim()||'data.json');localStorage.setItem('gh_token',document.getElementById('cfg-token').value.trim());document.getElementById('cfg-banner').classList.remove('show');loadData().then(()=>{renderNav();renderShelf();});}
function togFeat(i,v){features[i].on=v;renderNav();renderSettings();scheduleSave();}
function setSpineGradMode(m){spineGradMode=m;localStorage.setItem('spineGradMode',m);renderSettings();}
function renderTagCard(){const el=document.getElementById('tag-card');if(!el)return;const freq=tagFreq();el.innerHTML=`<div class="row between" style="margin-bottom:10px"><div style="font-size:13px;font-weight:500">登録タグ (${tagMaster.length}/50)</div><button class="btn btn-sm" onclick="showAddTag()">+ タグを追加</button></div><div id="tag-add-box" style="display:none;margin-bottom:10px"><div class="tag-edit-box"><input class="edit-inp" id="tan-inp" placeholder="タグ名を入力..." style="margin-bottom:6px"><div style="font-size:12px;color:#888;margin-bottom:3px">カラー</div><div class="pal" id="tap-pal"></div><div class="row" style="justify-content:flex-end;gap:6px;margin-top:8px"><button class="btn btn-sm" onclick="hideAddTag()">キャンセル</button><button class="btn-pri btn-sm" onclick="commitAddTag()">追加</button></div></div></div>${sortedTags().map(t=>`<div class="tag-row"><span class="chip chip-on" style="background:${t.color};font-size:12px">${t.name}</span><span style="flex:1;font-size:12px;color:#888;margin-left:8px">${freq[t.id]||0}冊</span><button class="btn btn-sm" onclick="startET('${t.id}')">編集</button><button class="btn btn-sm btn-danger" onclick="delTag('${t.id}')">削除</button></div><div id="te-${t.id}" style="display:none"><div class="tag-edit-box"><input class="edit-inp" id="ten-${t.id}" value="${t.name}" style="margin-bottom:6px"><div style="font-size:12px;color:#888;margin-bottom:3px">カラー</div><div class="pal" id="tep-${t.id}"></div><div class="row" style="justify-content:flex-end;gap:6px;margin-top:8px"><button class="btn btn-sm" onclick="cancelET('${t.id}')">キャンセル</button><button class="btn-pri btn-sm" onclick="commitET('${t.id}')">保存</button></div></div></div>`).join('')||'<div style="font-size:13px;color:#888">タグがありません</div>'};addPalIdx=0;renderTagAddPal();sortedTags().forEach(t=>{tagEditPalMap[t.id]=Math.max(0,PALETTE.indexOf(t.color));renderTagEditPal(t.id);});}
function renderTagAddPal(){const el=document.getElementById('tap-pal');if(!el)return;el.innerHTML=PALETTE.map((c,i)=>`<div class="pcol ${i===addPalIdx?'sel':''}" style="background:${c}" onclick="addPalIdx=${i};renderTagAddPal()"></div>`).join('');}
function renderTagEditPal(id){const el=document.getElementById('tep-'+id);if(!el)return;el.innerHTML=PALETTE.map((c,i)=>`<div class="pcol ${i===tagEditPalMap[id]?'sel':''}" style="background:${c}" onclick="tagEditPalMap['${id}']=${i};renderTagEditPal('${id}')"></div>`).join('');}
function showAddTag(){document.getElementById('tag-add-box').style.display='';document.getElementById('tan-inp').value='';addPalIdx=0;renderTagAddPal();}
function hideAddTag(){document.getElementById('tag-add-box').style.display='none';}
function commitAddTag(){const name=document.getElementById('tan-inp').value.trim();if(!name||tagMaster.length>=50||tagMaster.find(t=>t.name===name))return;tagMaster.push({id:'t'+Date.now(),name,color:PALETTE[addPalIdx]});renderTagCard();scheduleSave();}
function startET(id){sortedTags().forEach(t=>{const e=document.getElementById('te-'+t.id);if(e)e.style.display='none';});const el=document.getElementById('te-'+id);if(el)el.style.display='';tagEditPalMap[id]=Math.max(0,PALETTE.indexOf((tagById(id)||{}).color||PALETTE[0]));renderTagEditPal(id);}
function cancelET(id){const el=document.getElementById('te-'+id);if(el)el.style.display='none';}
function commitET(id){const t=tagById(id);if(!t)return;const name=document.getElementById('ten-'+id).value.trim();if(name)t.name=name;t.color=PALETTE[tagEditPalMap[id]||0];renderTagCard();scheduleSave();}
function delTag(id){if(!confirm('このタグを削除しますか？すべての本からも外れます。'))return;tagMaster=tagMaster.filter(t=>t.id!==id);books=books.map(b=>({...b,tagIds:b.tagIds.filter(x=>x!==id)}));delete tagFilterModes[id];renderTagCard();scheduleSave();}

function openBookModal(){mST=[];mSF=0;mNP=0;document.getElementById('m-title').value='';document.getElementById('m-date').value=today();document.getElementById('m-memo').value='';document.getElementById('m-tags-wrap').style.display=feat('tags')?'':'none';document.getElementById('m-fav-wrap').style.display=feat('fav')?'':'none';document.getElementById('m-memo-wrap').style.display=feat('memo')?'':'none';const sw=document.getElementById('m-series-wrap');if(sw){sw.style.display=feat('series')&&series.length?'':'none';}renderMTC();renderMFC();renderMNP();renderMSeriesSel();document.getElementById('book-modal').classList.add('open');}
function closeBookModal(){document.getElementById('book-modal').classList.remove('open');}
function renderMSeriesSel(){const sw=document.getElementById('m-series-wrap');if(!sw)return;sw.style.display=feat('series')&&series.length?'':'none';const sel=document.getElementById('m-series-sel');if(!sel)return;const q=(document.getElementById('m-title')?.value||'').toLowerCase();const sorted=[...series].sort((a,b)=>relevanceScore(b.name,q||b.name)-relevanceScore(a.name,q||a.name));sel.innerHTML='<option value="">シリーズに追加（任意）</option>'+sorted.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');}
function renderMTC(){document.getElementById('m-tag-chips').innerHTML=sortedTags().map(t=>{const on=mST.includes(t.id);return`<span class="chip ${on?'chip-on':'chip-off'}" style="${on?'background:'+t.color:''}" onclick="togMT('${t.id}')">${t.name}</span>`;}).join('');}
function togMT(id){mST=mST.includes(id)?mST.filter(x=>x!==id):[...mST,id];renderMTC();}
function renderMFC(){document.getElementById('m-fav-chips').innerHTML=FAV_OPTS.map(o=>{const on=mSF===o.v;return`<span class="chip ${on?'chip-on':'chip-off'}" style="${on?'background:'+FAV_C[o.v]:''}" onclick="mSF=mSF===${o.v}?0:${o.v};renderMFC()">${o.l}</span>`;}).join('');}
function renderMNP(){document.getElementById('m-new-tag-pal').innerHTML=PALETTE.map((c,i)=>`<div class="pcol ${i===mNP?'sel':''}" style="background:${c}" onclick="mNP=${i};renderMNP()"></div>`).join('');}
function addTagFromModal(){if(tagMaster.length>=50)return;const name=document.getElementById('m-new-tag-name').value.trim();if(!name||tagMaster.find(t=>t.name===name))return;const id='t'+Date.now();tagMaster.push({id,name,color:PALETTE[mNP]});mST=[...mST,id];document.getElementById('m-new-tag-name').value='';renderMTC();}
function saveBook(type){const title=document.getElementById('m-title').value.trim();if(!title)return;const date=type==='normal'?(document.getElementById('m-date').value||''):'';const newBook={id:Date.now(),title,dates:date?[date]:[],tagIds:[...mST],fav:mSF,type,memo:document.getElementById('m-memo').value};books.unshift(newBook);const sid=document.getElementById('m-series-sel')?.value;if(sid){const s=series.find(x=>x.id===sid);if(s)s.bookIds.push(newBook.id);}closeBookModal();renderShelf();scheduleSave();}

function applyAccent(idx){const t=ACCENT_THEMES[idx];if(!t)return;const r=document.documentElement.style;r.setProperty('--accent',t.accent);r.setProperty('--accent-dark',t.dark);r.setProperty('--accent-bg',t.bg);r.setProperty('--accent-text',t.text);localStorage.setItem('accentIdx',String(idx));const mcBody=document.getElementById('mc-body');if(mcBody)renderMC();}
function initAccent(){const idx=parseInt(localStorage.getItem('accentIdx')||'0');applyAccent(idx);}

async function init(){
  initAccent();
  const c=getCfg();
  if(!c.OWNER||!c.REPO||!c.TOKEN){
    document.getElementById('loading-overlay').style.display='none';
    document.getElementById('cfg-banner').classList.add('show');
    features=defFeats();renderNav();renderSettings();
    document.getElementById('nb-settings')?.classList.add('act');
    document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
    document.getElementById('pg-settings').classList.add('on');
    return;
  }
  await loadData();
  document.getElementById('loading-overlay').style.display='none';
  renderNav();document.getElementById('nb-shelf')?.classList.add('act');renderShelf();
}
init();
</script>
</body>
</html>
