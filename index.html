<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Log</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #fff;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #ddd;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #4caf50;
  color: white;
}

.container {
  padding: 12px;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.char-card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}

.small {
  color: #666;
  font-size: 12px;
}

</style>
</head>

<body>

<header>
  <b>📚 読書ログ</b>
  <div>
    <button onclick="loadData()">読込</button>
    <button onclick="saveData()">保存</button>
  </div>
</header>

<div class="container">

<!-- 🔍 検索 -->
<div class="card">
  <input id="searchChar" placeholder="検索（名前・メモ・あだ名）" oninput="renderCharacters()">

  <select id="sortChar" onchange="renderCharacters()">
    <option value="name_asc">名前 ↑</option>
    <option value="name_desc">名前 ↓</option>
    <option value="series_asc">シリーズ ↑</option>
    <option value="series_desc">シリーズ ↓</option>
  </select>
</div>

<!-- ➕ 追加 -->
<div class="card">
  <b>登場人物追加</b>

  <input id="charName" placeholder="名前">
  <input id="charAlias" placeholder="あだ名（カンマ区切り）">
  <textarea id="charMemo" placeholder="メモ"></textarea>
  <input id="seriesInput" placeholder="シリーズ名">

  <button onclick="addCharacterUI()">追加</button>
</div>

<!-- 📋 一覧 -->
<div id="characterList"></div>

</div>

<script src="app.js"></script>

</body>
</html>
