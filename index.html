<!-- ② あなたのアプリ本体（こっちが後） -->
<script>
window.saveData = async function(){
  const data = {
    books,
    series,
    characters,
    tagMaster
  };

  localStorage.setItem("bookAppData", JSON.stringify(data));

  try {
    await window.setDoc(
      window.doc(window.db, "app", "data"),
      data
    );
    console.log("🔥 保存成功");
  } catch (e) {
    console.error("❌ 保存失敗", e);
  }
};
</script>
