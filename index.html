<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📙読書ログ</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f2f2;
}

header{
  background:#92a578;
  color:white;
  padding:16px;
  font-size:20px;
}

main{
  padding:16px;
}

button{
  background:#cccccc;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  margin-bottom:10px;
}

.btnme{
background:#babcb1;
color:black;
font-weight:bold;
}

.card{
  background:#f5f1f2;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px #cccccc;
  box-shadow:none;
}

#loading{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#tag-filter {
  margin: 10px 0;
}


.page{
  padding:12px;
}

.hidden{
  display:none;
}
.sear{
border:1px solid #ddd;
border-radius:8px;
padding-left:10px;
font-size:13px;
background:#fff;
color:#333
}


/* ★これ重要（今回の勝因） */
#loading.hidden{
  display:none;
}
</style>

</head>

<body>

<div id="loading">読み込み中…</div>

<header>📙 読書ログ


<nav>
  <button class="btnme" onclick="go('home')">ホーム</button>
  <button class="btnme" onclick="go('series')">シリーズ</button>
  <button class="btnme" onclick="go('characters')">人物</button>
  <button class="btnme" onclick="go('stats')">統計</button>
  <button class="btnme" onclick="go('settings')">設定</button>
  <button class="btnme" onclick="loadData()">更新</button>
</nav>
</header>

<input id="search" class="sear" oninput="renderHome()" placeholder="検索">
<div id="tag-filter"></div>
<div id="color-mode"></div>

<div id="page-home" class="page"></div>
<div id="page-series" class="page hidden"></div>
<div id="page-characters" class="page hidden"></div>
<div id="page-stats" class="page hidden"></div>
<div id="page-settings" class="page hidden"></div>
<div id="page-detail" class="page hidden"></div>


<main>
  <div id="list"></div>
</main>



<script src="app.js"></script>
</body>
</html>
