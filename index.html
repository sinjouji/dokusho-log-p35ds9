<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読書ログ（GitHub同期・設定不要）</title>
<style>
body{font-family:sans-serif;margin:0;padding:0;background:#f5f5f5;}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:10;}
.hidden{display:none;}
header{background:#4caf50;color:#fff;padding:12px;font-size:18px;}
main{padding:16px;}
.card{background:#fff;padding:12px;margin-bottom:12px;border-radius:8px;}
button{padding:8px 12px;border:none;border-radius:6px;background:#4caf50;color:#fff;}
</style>
</head>
<body>

<div id="loading">読み込み中...</div>

<header>📚 読書ログ</header>
<main>
  <button onclick="loadData()">🔄 再読み込み</button>
  <div id="list"></div>
</main>

<script>
let books=[];

// ★ あなたのJSON URL
const DATA_URL = "https://raw.githubusercontent.com/sinjouji/my-b0o0oksd6t6/main/data.json";

async function loadData(){
  try{
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    const text = await res.text();

    const clean = text.replace(/^\uFEFF/, '');
    const data = JSON.parse(clean);

    console.log("① after parse", data.books.length);

books = data.books;

console.log("② after assign", books.length);

render();

console.log("③ after render", books.length);

    books = Array.isArray(data.books) ? data.books : [];

   try{
  render();
}catch(e){
  console.error("render error", e);
}

document.getElementById('loading');

  }catch(e){
    console.error(e);
    alert("読み込み失敗: " + e.message);
    document.getElementById('loading').classList.add('hidden');
  }
}

function render(){
  const el = document.getElementById('list');
  el.innerHTML = "";

  console.log("render books:", books);

  if(!books || books.length === 0){
    el.innerHTML = "<div class='card'>データがありません</div>";
    return;
  }

  for(let i=0;i<books.length;i++){
    const b = books[i];
    if(!b) continue;

    const d = document.createElement('div');
    d.className = "card";
    d.textContent = b.title || "（タイトルなし）";

    el.appendChild(d);
  }
}

// 初期化
loadData();
</script>

</body>
</html>
