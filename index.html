<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Log</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f3f3f3;
}

header {
  background: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ddd;
}

button {
  border: none;
  background: #4caf50;
  color: white;
  padding: 6px 10px;
  border-radius: 8px;
}

/* ===== 切り替え ===== */
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.tab {
  background: #ddd;
  padding: 6px 10px;
  border-radius: 8px;
}

.active {
  background: #4caf50;
  color: white;
}

/* ===== 本棚 ===== */
.bookshelf {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 6px;
}

.book {
  width: 30px;
  height: 120px;
  border-radius: 4px;
  color: white;
  writing-mode: vertical-rl;
  text-align: center;
  font-size: 12px;
  padding: 4px;
}

/* ===== リスト ===== */
.list {
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}

/* ===== 共通 ===== */
input, textarea, select {
  width: 100%;
  margin: 5px 0;
  padding: 6px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.section {
  padding: 10px;
}

</style>
</head>

<body>

<header>
  <b>📚 読書ログ</b>
  <div>
    <button onclick="loadData()">読込</button>
    <button onclick="saveData()">保存</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('books')">本棚</div>
  <div class="tab" onclick="switchTab('characters')">人物</div>
</div>

<!-- 本棚 -->
<div id="booksView">

  <div class="bookshelf" id="bookshelf"></div>

  <div class="list" id="bookList"></div>

</div>

<!-- 人物 -->
<div id="charactersView" style="display:none">

  <div class="section">
    <input id="searchChar" placeholder="検索" oninput="renderCharacters()">

    <select id="sortChar" onchange="renderCharacters()">
      <option value="name_asc">名前↑</option>
      <option value="name_desc">名前↓</option>
      <option value="series_asc">シリーズ↑</option>
      <option value="series_desc">シリーズ↓</option>
    </select>
  </div>

  <div class="section">
    <b>追加</b>
    <input id="charName" placeholder="名前">
    <input id="charAlias" placeholder="あだ名">
    <textarea id="charMemo"></textarea>
    <input id="seriesInput" placeholder="シリーズ">

    <button onclick="addCharacterUI()">追加</button>
  </div>

  <div id="characterList"></div>

</div>

<script src="app.js"></script>

<script>
// ===== タブ切替 =====
function switchTab(tab) {
  document.getElementById("booksView").style.display = tab === "books" ? "block" : "none";
  document.getElementById("charactersView").style.display = tab === "characters" ? "block" : "none";
}

// ===== 本棚描画（簡易版） =====
function renderBooks() {
  const shelf = document.getElementById("bookshelf");

  shelf.innerHTML = data.books.map(b => `
    <div class="book" style="background:${randomColor()}">
      ${b.title || "本"}
    </div>
  `).join("");
}

function randomColor() {
  const colors = ["#4caf50","#2196f3","#ff9800","#9c27b0"];
  return colors[Math.floor(Math.random()*colors.length)];
}

// load時にも呼ぶようにする
const _loadData = loadData;
loadData = async function() {
  await _loadData();
  renderBooks();
};

</script>

</body>
</html>
